name: deploy to dev
on:
  push: 
   branches:
    ["develop","release/**"]
   paths:
   - 'auth-service/**'
   - '.github/workflows/ci.auth-service.yml'
permissions:
 id-token: write
 contents: read
 security-events: write
 actions: read

 
jobs:
 buildandpush:
   name: full ci
   uses: "./.github/workflows/_java-build.yml"
   with:
    project: pharma
    environments: dev
    servicedir: auth-service
   secrets: inherit
 deploytodev:
   runs-on: ubuntu-22.04
   needs: buildandpush
   steps:
   - name: print the image number
     run: echo "${{needs.buildandpush.outputs.IMAGE_NUMBER}}" 

   - name: checkout the gitops
     uses: actions/checkout@v4
     with:
      repository: hemanthrajgandham/zen-gitops
      path: _gitops
      token: "${{secrets.GITOPS_TOKEN}}"
   - name: update the yaml
     run: | 
      IMAGE_TAG="${{needs.buildandpush.outputs.IMAGE_NUMBER}}"
      yq eval '.image.tag= "${{needs.buildandpush.outputs.IMAGE_NUMBER}}"' -i _gitops/envs/dev/values-auth-service.yaml
      cd _gitops
      git add .
      git config user.name  "github-actions[bot]"
      git config user.email "github-actions[bot]@users.noreply.github.com"
      git commit -m 'ci(dev): update auth-service → ${IMAGE_TAG}'
      git push
 openprqa:
   runs-on: ubuntu-22.04
   needs: buildandpush
   steps: 
   - name: checkout
     uses: actions/checkout@v4
     with:
      repository: hemanthrajgandham/zen-gitops
      token: ${{secrets.GITOPS_TOKEN}}
      path: _gitops
   - name: create branch,commit and open pr
     env: 
      GH_TOKEN: "${{secrets.GITOPS_TOKEN}}"
     run: |
      IMAGE_TAG="${{needs.buildandpush.outputs.IMAGE_NUMBER}}" 
      BRANCH="promote/qa/auth-service/${IMAGE_TAG}"
      cd _gitops
      git checkout -b $BRANCH
      yq eval '.image.tag'=\"$IMAGE_TAG\" -i "envs/qa/values-auth-service.yaml"
      git config user.name "github-actions[bot]"
      git config user.email "github-actions[bot]@users.noreply.github.com"
      git add .
      git commit -m "promote(qa): auth-service → ${IMAGE_TAG}"
      git push origin $BRANCH
       printf '%s\n' \
            "## QA Promotion" \
            "" \
            "Service : auth-service" \
            "Image   : ${IMAGE_TAG}" \
            "Branch  : ${REF_NAME}" \
            "Actor   : ${ACTOR}" \
            "Build   : ${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}" \
            "" \
            "## Checklist" \
            "- [ ] DEV smoke test passed (see build link above)" \
            "- [ ] No unexpected config changes in this diff" \
            "- [ ] QA team sign-off" \
            "" \
            "Merging this PR updates envs/qa/values-auth-service.yaml." \
            "ArgoCD (pharma-qa) auto-syncs on merge." > /tmp/pr-body.md

          PR_URL=$(gh pr view --repo "$GITOPS_REPO_NAME" --head "$BRANCH" --json url -q .url 2>/dev/null || true)
          if [[ -n "$PR_URL" ]]; then
            echo "::notice title=QA PR already open::${PR_URL}"
          else
            gh pr create \
              --repo "$GITOPS_REPO_NAME" \
              --title "promote(qa): auth-service → ${IMAGE_TAG}" \
              --body-file /tmp/pr-body.md \
              --base main \
              --head "$BRANCH"
            echo "::notice title=QA PR opened::Review and merge in ${GITOPS_REPO_NAME} to deploy to QA."
          fi
          echo test
      


