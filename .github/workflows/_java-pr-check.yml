name: Reusable — Java PR Check (no Docker)

on:
  workflow_call:
    inputs:
      project:
        description: 'Project name'
        required: true
        type: string
        default: pharma

      environments:
        description: "environment name"
        type: string
        default: dev

      servicedir:
        description: 'Service directory'
        required: true
        type: string

    outputs:
      IMAGE_NUMBER:
        description: short github run number
        value: ${{ jobs.build.outputs.IMAGE_NUMBER }}

      PROJECT:
        value: ${{ inputs.project }}

      ENVIRONMENT:
        value: ${{ inputs.environments }}

      SERVICE_DIR:
        value: ${{ inputs.servicedir }}

    secrets:
      NVD_API_KEY:
        required: false

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  build:
    runs-on: ubuntu-22.04

    outputs:
      IMAGE_NUMBER: ${{ steps.meta.outputs.IMAGE_NUMBER }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set image number
        id: meta
        run: echo "IMAGE_NUMBER=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Print image number
        run: echo "Image number is ${{ steps.meta.outputs.IMAGE_NUMBER }}"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Integration testing
        working-directory: ${{ inputs.servicedir }}
        run: mvn verify

      - name: Upload JaCoCo reports
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: ${{ inputs.servicedir }}/target/site/jacoco/

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app.jar
          path: ${{ inputs.servicedir }}/target/*.jar

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"

      - name: Semgrep SAST (Java + OWASP)
        uses: semgrep/semgrep-action@v1
        with:
          config: |
            p/java
            p/owasp-top-ten

      - name: Create cache folder
        run: mkdir -p ~/.dependency-check

      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check
          key: owasp-nvd-${{ runner.os }}-${{ hashFiles(format('{0}/pom.xml', inputs.servicedir)) }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: OWASP Dependency Check
        if: false
        working-directory: ${{ inputs.servicedir }}
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -Ddata.directory=~/.dependency-check \
            -Dformat=HTML \
            -DfailBuildOnCVSS=7 \
            -DoutputDirectory=target/dependency-check-report \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }}
