name: hemanth cicd pipeline
on:
 push:
  branches: ["main"]
permissions: 
 contents: read
 id-token: write
 security-events: write
jobs:
  build:
   runs-on: ubuntu-22.04
   steps:
    - name: checkout code
      uses: actions/checkout@v7.0.0
    - name: setup java
      uses: actions/setup-java@v5.4.0
      with:
        java-version: 17
        distribution: temurin
        cache: mvn
        
    - name: get the github run number
      id: imagenumber
      run: |
        IMAGE_NUMBER="${GITHUB_SHA::7}" 
        echo image_sha="sha-${IMAGE_NUMBER}">> $GITHUB_OUTPUT
    - name: print number
      run: echo "${{steps.imagenumber.outputs.image_sha}}"
   


  
