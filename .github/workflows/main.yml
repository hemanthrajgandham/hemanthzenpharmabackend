name: cicd pipeline
on:
 workflow_dispatch:
   inputs:
     project:
       description: 'Project name'
       required: true
       type: string
       default: pharma
        
     environments:
       type: choice       
       options:
         - dev
         - qa
     servicedir:
       description: 'Service directory'
       required: true
       type: choice
       options:
          - auth-service
          

permissions:
  id-token: write
  contents: read
  security-events: write

env:
         REGISTRY: ${{ steps.login-ecr.outputs.registry }}
         PROJECT: ${{ inputs.project }}
         ENVIRONMENT: ${{ inputs.environments }}
         SERVICE_DIR: ${{ inputs.servicedir }}
         IMAGE_NUMBER: ${{ steps.meta.outputs.IMAGE_NUMBER }}  
         IMAGE: ${{steps.docker-build.outputs.IMAGE}}


jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: setup java
        uses: actions/setup-java@v5
        with:
         distribution: 'temurin'
         java-version: '17'
         cache: 'maven'
      - name: set image number based on github run number
        id: meta
        run: echo "IMAGE_NUMBER=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - name: Print image number
        run: echo "Image number is ${{ steps.meta.outputs.IMAGE_NUMBER }}"
     
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
         languages: java     

      - name: integration testing
        run: |
         cd auth-service
         mvn verify 
      - name: upload reports
        uses: actions/upload-artifact@v7.0.1
        with:
         name: jococo report
         path: auth-service/target/site/jacoco/
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        continue-on-error: false
        with:
         language: java
         output: results
         
         ram: 4096
      - name: upload codeql results
        uses: actions/upload-artifact@v7.0.1
        with:
         name: codeql results
         path: results
      - name: Semgrep SAST (java · owasp-top-ten)
        uses: semgrep/semgrep-action@v1
        continue-on-error: false
        with:
         config: >-
           p/java
           p/owasp-top-ten

      - name: create cahce folder
        run: mkdir -p ~/.dependency-check #ODC_DATA_DIR
        
      - name: Cache OWASP NVD database
       
        uses: actions/cache@v4
        with:
         path: ~/.dependency-check #ODC_DATA_DIR
         key: owasp-nvd-${{ runner.os }}-${{ hashFiles(format('{0}/pom.xml', inputs.servicedir)) }}
         restore-keys: owasp-nvd-${{ runner.os }}-
      - name: Check cache contents
        run: ls -la $HOME/.dependency-check

      - name: OWASP Dependency Check
        if: false
        working-directory: ${{ inputs.servicedir }}
        run: | 
         
         mvn org.owasp:dependency-check-maven:check -Ddata.directory=~/.dependency-check -Dformat=HTML -DfailBuildOnCVSS=7 -DoutputDirectory=target/dependency-check-report -DnvdApiKey=${{ secrets.NVD_API_KEY }}
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      
      - name: aws credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::${{secrets.AWS_ACCOUNT_ID}}:role/pharma-dev-github-action-role
          aws-region: us-east-1
      
      - name: login to ecr
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: docker build
        id: docker-build
        working-directory: ${{ inputs.servicedir }}
              
        run: |
          image="${REGISTRY}/${PROJECT}-${ENVIRONMENT}-${SERVICE_DIR}:${IMAGE_NUMBER}"
          echo $image
          
          docker build --build-arg UID=2000 --build-arg GID=2000 -t image .

          echo "IMAGE=$image" >> $GITHUB_OUTPUT
      - name: image full name
        run:  echo "$IMAGE"
         