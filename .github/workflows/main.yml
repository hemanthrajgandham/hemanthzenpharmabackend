name: cicd pipeline
on:
 workflow_dispatch:
   inputs:
     environments:
       type: choice       
       options:
         - dev
         - qa
     servicedir:
       description: 'Service directory'
       required: true
       type: choice
       options:
          - auth-service
          

permissions:
  contents: read
  security-events: write
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: setup java
        uses: actions/setup-java@v5
        with:
         distribution: 'temurin'
         java-version: '17'
         cache: 'maven'
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java     
     

      - name: integration testing
        run: |
         cd auth-service
         mvn verify 
      - name: upload reports
        uses: actions/upload-artifact@v7.0.1
        with:
          name: jococo report
          path: auth-service/target/site/jacoco/
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        continue-on-error: false
        with:
         language: java
         output: results
         
         ram: 4096
      - name: upload codeql results
        uses: actions/upload-artifact@v7.0.1
        with:
           name: codeql results
           path: results
      - name: Semgrep SAST (java · owasp-top-ten)
        uses: semgrep/semgrep-action@v1
        continue-on-error: false
        with:
          config: >-
            p/java
            p/owasp-top-ten
         
      - name: owasp dependency check cache
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check
          key: owasp-nvd-${{runner.os}}-${{hashfiles(format('${0}/pom.xml', inputs.servicedir))}}
          restore-keys: |
            owasp-nvd-${{runner.os}}-