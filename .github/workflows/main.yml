name: cicd pipeline
on:
 workflow_dispatch:
   inputs:
     environments:
       type: choice       
       options:
         - dev
         - qa
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: setup java
        uses: Fleshgrinder/setup-java@1.0.0
        with:
          version: 17
          package-type: jdk
         
