name: hemanth cicd pipeline
on:
 push:
  branches: ["main"]
permissions: 
 contents: read
 id-token: write
 security-events: write
jobs:
  build:
   runs-on: ubuntu-22.04
   strategy:
     fail-fast: true
   outputs:
     imagenumber: ${{steps.imagenumber.outputs.image_sha}}
     outputs: ${{steps.login-ecr.outputs.REGISTRY}}
   steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name: setup java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: get the github run number
      id: imagenumber
      run: |
        IMAGE_NUMBER="${GITHUB_SHA::7}" 
        echo image_sha="sha-${IMAGE_NUMBER}">> $GITHUB_OUTPUT
    - name: print number
      run: echo "${{steps.imagenumber.outputs.image_sha}}"
    - name: codeql install
      uses: github/codeql-action/init@v3
      with:
       languages: java
       queries: security-extended
    - name: build
      run: |
        cd auth-service
        mvn verify
    - name: upload
      uses: actions/upload-artifact@v4
      with:
        name: authservice
        path: auth-service/target/site/jaccoco/jacoco.xml
    - name: analyze codeql
      uses: github/codeql-action/analyze@v3
      continue-on-error: false
      with:
        category: /language:java
      
      

    - name: semgrep
      uses: semgrep/semgrep-action@v1
      continue-on-error: false
      with: 
       config: |
        p/owasp-top-ten
        p/java
       severity: HIGH,CRITICAL
    - name: cache nvd owasp db
      uses: actions/cache@v4
      
      with:
       path: $HOME/.owasp/dependency-check-data
       key: owasp-nvd-${{runner.os}}-${{hashFiles(format('{0}/pom.xml','auth-service'))}}
       restore-keys: owasp-nvd-${{runner.os}}


    - name: owasp dep check run
      if: false
      run: |
       cd auth-service
       mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7 -DdataDirectory=$HOME/.owasp/dependency-check-data -Dformat=HTML
    - name: upload owasp report
      if: false
      uses: actions/upload-artifact@v4
      with:
        path: auth-service/target/dependency-check-report.html

    - name: aws configure
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: us-east-1
        role-to-assume: arn:aws:iam::${{secrets.AWS_ACCOUNT_ID}}:role/pharma-dev-github-action-role
    - name: login to ecr
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
    - name : print ecr name
      run: echo "${{steps.login-ecr.outputs.REGISTRY}}"
    - name: docker build
      run: |
        cd auth-service
        echo "${{steps.login-ecr.outputs.REGISTRY}}/pharma-dev-auth-service:${image_sha}"
        docker build -t "${{steps.login-ecr.outputs.REGISTRY}}/pharma-dev-auth-service:${image_sha}" .
      
        
      
      
  
      
      
   


  
