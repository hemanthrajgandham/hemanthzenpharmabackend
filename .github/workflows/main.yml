name: hemanth cicd pipeline
on:
 push:
  branches: ["main"]
permissions: 
 contents: read
 id-token: write
 security-events: write
jobs:
  build:
   runs-on: ubuntu-22.04
   strategy:
     fail-fast: true
   outputs:
     imagenumber: ${{steps.imagenumber.outputs.image_sha}}
     registry: ${{steps.login-ecr.outputs.REGISTRY}}
     digest: ${{steps.docker-build.outputs.digest}}
    
   steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name: setup java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: get the github run number
      id: imagenumber
      run: |
       
        echo image_sha="sha-${GITHUB_SHA::7}">> $GITHUB_OUTPUT
    - name: print number
      run: echo "${imagenumber}"
    - name: codeql install
      uses: github/codeql-action/init@v4
      with:
       languages: java
       queries: security-extended
    - name: build
      run: |
        cd auth-service
        mvn verify
    - name: upload
      uses: actions/upload-artifact@v4
      with:
        name: authservice
        path: auth-service/target/site/jacoco/jacoco.xml
    - name: analyze codeql
      uses: github/codeql-action/analyze@v4
      continue-on-error: false
      with:
        category: /language:java
      
      

    - name: semgrep
      uses: semgrep/semgrep-action@v1
      continue-on-error: false
      with: 
       config: |
        p/owasp-top-ten
        p/java
       severity: HIGH,CRITICAL
    - name: cache nvd owasp db
      uses: actions/cache@v4
      
      with:
       path: $HOME/.owasp/dependency-check-data
       key: owasp-nvd-${{runner.os}}-${{hashFiles(format('{0}/pom.xml','auth-service'))}}
       restore-keys: owasp-nvd-${{runner.os}}


    - name: owasp dep check run
      if: false
      run: |
       cd auth-service
       mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7 -DdataDirectory=$HOME/.owasp/dependency-check-data -Dformat=HTML
    - name: upload owasp report
      if: false
      uses: actions/upload-artifact@v4
      with:
        path: auth-service/target/dependency-check-report.html

    - name: aws configure
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: us-east-1
        role-to-assume: arn:aws:iam::${{secrets.AWS_ACCOUNT_ID}}:role/pharma-dev-github-action-role
    - name: login to ecr
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
 
    - name: docker build
      id: docker-build
      run: |
        cd auth-service
        IMAGE="${{steps.login-ecr.outputs.REGISTRY}}/dev/auth-service:${{steps.imagenumber.outputs.image_sha}}"
        echo "${IMAGE}"
        docker build -t "${IMAGE}" .
        docker push "${IMAGE}"
        
        DIGEST= ${docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE}"|awk -F@ '{print 2}'}
        echo digest=$DIGEST >> $GITHUB_OUTPUT
        echo ${digest}


        
    
        
        
      
        
      
      
  
      
      
   


  
