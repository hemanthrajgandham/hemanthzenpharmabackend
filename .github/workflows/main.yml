name: promote to prod
on:
 workflow_dispatch:
   inputs:
     services:
       type: choice
       description: "select the service for promotion to code"
       options:
         - auth-service
         - api-gateway
     
permissions: 
  id-token: write
  security-events: write
  contents: read
  actions: read
  pull-requests: write
jobs:
  promote_to_prod:
    runs-on: ubuntu-22.04
    steps:
    - name: checkout the code for gitops
      uses: actions/checkout@v4
      with:
       repository: hemanthrajgandham/zen-gitops
       path: _gitops
       token: ${{secrets.GITOPS_TOKEN}}
    -  name: read the image number
       id: imagenumber
       run: |
        IMAGE=$(yq eval '.image.tag' "_gitops/envs/qa/values-${{inputs.services}}.yaml")
        echo "image=$IMAGE" >> $GITHUB_OUTPUT
           
    -  name: show the image number
       run: echo "${{steps.imagenumber.outputs.image}}"
    -  name: create branch
       env:
         GH_TOKEN: "${{secrets.GITOPS_TOKEN}}"
       run: |
         image=${{steps.imagenumber.outputs.image}}
         BRANCH="promote/prod/${{inputs.services}}/${image}"
         cd _gitops
         git checkout -b $BRANCH
         yq eval '.image.tag'=\"${image}\" -i "envs/prod/values-${{inputs.services}}.yaml"
         git config user.name "github-actions[bot]"
         git config user.email "github-actions[bot]@users.noreply.github.com"
         git add "envs/prod/values-${{inputs.services}}.yaml"
         git commit -m " added qa imagenumber to prod promote branch by github bot"

         git push -f origin $BRANCH

         printf '%s\n' \
         "##prod promotion" \
         " " \
         "Service: ${{inputs.services}}" \
         "Actor: ${{github.actor}}" \
         "image: ${image}" \
         "workflow_run: ${{github.server_url}}/${{github.repository}}/actions/runs/${{github.run_id}}" \
         ""\
         "merging the pr  means updating the prod yaml values and argocd is manual sync and sync it during change window" > /tmp/body.md

         gh pr create --repo hemanthrajgandham/zen-gitops --title "promote prod:${{inputs.services}} -> ${image}" --body /tmp/body.md --base main --head "$BRANCH"

          echo "::notice title=PROD PR opened::Review, get approvals, and merge in hemanthrajgandham\gitops. Then manually sync ArgoCD pharma-prod/${{inputs.services}}."
         
         

         

         
    
