  name: CI/CD auth-service
  on:
    push:
      branches: ["develop","release/**"]
      paths:
      - 'auth-service/**'
      - '.github/workflows/ci-auth-service.yml'
  permissions:
   id-token: write
   contents: read
   security-events: write
   actions: read
  jobs:
   build:
    name: build
    uses: ./.github/workflows/_java-build.yml
    with:
     project: pharma
     environments: dev
     servicedir: auth-service
   
  
 
